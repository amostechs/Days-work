<!DOCTYPE html>
<html>
<head>
  <title>Day's Work</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <header>
    <h1>Day's Work</h1>
    <p class="subtitle">Your daily productivity dashboard</p>
  </header>

  <!-- Add Task -->
  <div class="card add-task">
    <input id="title" placeholder="Task title">
    <input id="date" type="date">
    <select id="priority">
      <option value="low">Low</option>
      <option value="medium">Medium</option>
      <option value="high">High</option>
    </select>
    <button onclick="addTask()">+ Add</button>
  </div>

  <!-- Dashboard Grid -->
  <div class="grid">

    <div class="card">
      <h2>Today</h2>
      <ul id="today"></ul>
    </div>

    <div class="card">
      <h2>Uncompleted</h2>
      <ul id="uncompleted"></ul>
    </div>

  </div>

</div>

<script src="app.js"></script>
</body>
</html>
